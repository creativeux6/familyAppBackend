  /onboarding/questionnaire:
    post:
      tags:
        - Onboarding
      summary: 'Submit relative questionnaire'
      description: 'Creates family member stubs, builds graph edges, runs family matching.'
      operationId: onboardingSubmitQuestionnaire
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - answers
              properties:
                answers:
                  type: array
                  items:
                    properties:
                      relative_slot:
                        type: string
                        example: father
                      first_name:
                        type: string
                        example: Ahmed
                      last_name:
                        type: string
                        example: Khan
                      date_of_birth:
                        type: string
                        format: date
                        example: '1965-01-10'
                      birthplace:
                        type: string
                      gender:
                        type: string
                        enum:
                          - male
                          - female
                          - other
                          - unknown
                      is_living:
                        type: boolean
                    type: object
              type: object
      responses:
        201:
          description: 'Questionnaire processed'
        401:
          description: Unauthenticated
        422:
          description: 'Validation error'
      security:
        -
          bearerAuth: []
